# release: build the gem and push hop-endpoint to RubyGems on a semver tag.
#
# Inert in the monorepo (root .github/workflows only). Copybara mirrors sdk/ruby to its
# own repo, where hop-endpoint.gemspec is at the repo root and this becomes the repo-root
# release workflow.
name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# OIDC trusted publishing (no long-lived key). Configure the trusted publisher on rubygems.org first:
# gem hop-endpoint, repository hopmesh/hop-sdk-ruby, workflow release.yml.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      # Guard: the tag (minus its leading v) must equal the gemspec's version, so a
      # mistyped tag can never publish the wrong version.
      - name: Verify tag matches gem version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(ruby -e "puts Gem::Specification.load(Dir['*.gemspec'].first).version")"
          if [ "$tag" != "$ver" ]; then
            echo "tag $tag does not match gemspec version $ver" >&2
            exit 1
          fi

      # Exchange the GitHub OIDC token for a short-lived RubyGems key (trusted publishing).
      - name: Configure RubyGems OIDC credentials
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Build gem
        run: gem build *.gemspec

      # Token fallback: drop the OIDC step + id-token, add env GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}.
      - name: Push to RubyGems
        run: gem push *.gem
