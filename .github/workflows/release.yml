# Push Gem: publish hop-endpoint to RubyGems on a tag, via RubyGems trusted publishing (OIDC).
#
# Inert in the monorepo (GitHub runs only root .github/workflows). Copybara mirrors sdk/ruby to its own
# repo, where hop-endpoint.gemspec + Rakefile sit at the repo root and this becomes the repo-root release
# workflow. The RubyGems trusted publisher must reference THIS workflow file's name (release.yml) and the
# role below (rubygems.org > gem hop-endpoint > Trusted publishers).
name: Push Gem

'on':
  push:
    tags:
      - 'v*'

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: rubygems/configure-rubygems-credentials@main
        with:
          role-to-assume: rg_oidc_akr_kwpf5qjgz46ztk3ax3to
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set remote URL
        run: |
          # Attribute commits to the last committer on HEAD
          git config --global user.email "$(git log -1 --pretty=format:'%ae')"
          git config --global user.name "$(git log -1 --pretty=format:'%an')"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/$GITHUB_REPOSITORY"
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version: ruby
      - name: Release
        run: bundle exec rake release
      - name: Wait for release to propagate
        run: |
          gem install rubygems-await
          gem_tuple="$(ruby -rbundler/setup -rbundler -e '
              spec = Bundler.definition.specs.find {|s| s.name == ARGV[0] }
              raise "No spec for #{ARGV[0]}" unless spec
              print [spec.name, spec.version, spec.platform].join(":")
            ' "hop-endpoint")"
          gem await "${gem_tuple}"
